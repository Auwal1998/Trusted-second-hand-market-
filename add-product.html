<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Product - Trusted Market NG</title>
</head>

<body>

<h1>Add New Product</h1>

<form>

<label>Product Name</label><br>
<input type="text"><br><br>

<label>Category</label><br>
<select>
<option>Phones</option>
<option>Laptops</option>
<option>Fashion</option>
<option>Vehicles</option>
<option>Home Appliances</option>
<option>Electronics</option>
</select><br><br>

<label>Condition</label><br>
<select>
<option>Brand New</option>
<option>Like New</option>
<option>Fairly Used</option>
<option>Used</option>
</select><br><br>

<label>Price (₦)</label><br>
<input type="number"><br><br>

<label>Quantity</label><br>
<input type="number"><br><br>

<label>Description</label><br>
<textarea rows="5" cols="30"></textarea><br><br>

<label>Location</label><br>
<input type="text" placeholder="State, City"><br><br>

<label>WhatsApp Number</label><br>
<input type="tel"><br><br>

<label>Upload Product Photo</label><br>
<input type="file"><br><br>

<button type="submit">Post Product</button>

</form>

</body>
</html>
